<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>לאכול פשוט</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="לאכול פשוט">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#F7F5F0">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F5F0;--surface:#FFFFFF;--surface2:#F0EDE6;--border:rgba(0,0,0,0.10);--border2:rgba(0,0,0,0.18);--text:#1A1A18;--text2:#5C5A54;--text3:#9E9B93;--green:#2D6A4F;--green-light:#D8EDDF;--green-mid:#95C9A6;--amber:#7D4E24;--amber-light:#FAEADA;--blue:#1B4F72;--blue-light:#D4E9F7;--purple:#4A3A6B;--purple-light:#EAE4F5;--red:#8B2E2E;--red-light:#F9E0E0;--radius:10px;--radius-lg:14px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl;}
.header{background:var(--surface);border-bottom:0.5px solid var(--border2);padding:0 1.25rem;display:flex;align-items:center;height:52px;position:sticky;top:0;z-index:50;}
.logo{font-size:17px;font-weight:700;letter-spacing:-0.3px;}
.logo span{color:var(--green);}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:0.5px solid var(--border2);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;border:none;background:none;cursor:pointer;font-family:'Heebo',sans-serif;color:var(--text3);font-size:10px;gap:4px;transition:color 0.15s;}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.nav-btn.active{color:var(--green);}
.content{padding:1rem 1.25rem 80px;}
.section{display:none;}.section.active{display:block;}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:.875rem;}
.top-bar h2{font-size:15px;font-weight:500;}
.btn{padding:7px 13px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--surface);cursor:pointer;font-size:12px;font-weight:500;font-family:'Heebo',sans-serif;color:var(--text);}
.btn:hover{background:var(--surface2);}
.btn-green{background:var(--green-light);color:var(--green);border-color:var(--green-mid);}
.btn-green:hover{background:var(--green-mid);}
.btn-row{display:flex;gap:7px;}
/* PANTRY */
.pantry-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:.875rem;}
.pcat h3{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;}
.p-item-row{display:flex;align-items:center;gap:7px;font-size:13px;padding:3px 0;cursor:pointer;}
.p-item-row input{width:13px;height:13px;cursor:pointer;flex-shrink:0;accent-color:var(--green);}
.p-item-row.checked label{text-decoration:line-through;color:var(--text3);}
.p-item-row.checked{color:var(--text3);}
/* WEEK */
.week-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:5px;margin-bottom:.5rem;}
.day-col{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:7px 5px;}
.day-name{font-size:10px;font-weight:500;color:var(--text2);text-align:center;margin-bottom:5px;}
.meal-label{font-size:9px;color:var(--text3);margin-bottom:2px;}
.meal-chip{font-size:10px;background:var(--surface2);border-radius:4px;padding:4px 5px;cursor:pointer;color:var(--text);border:0.5px solid var(--border);line-height:1.3;margin-bottom:3px;min-height:26px;display:flex;align-items:center;}
.meal-chip:hover{border-color:var(--border2);}
.meal-chip.empty{color:var(--text3);border-style:dashed;background:none;justify-content:center;font-style:italic;}
.snack-chip{font-size:9px;background:var(--purple-light);border-radius:4px;padding:3px 5px;color:var(--purple);border:0.5px solid #C8BBE8;cursor:pointer;text-align:center;margin-top:3px;}
.hint{font-size:11px;color:var(--text3);margin-top:6px;}
/* COOK DAY */
.cook-total{background:var(--green-light);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--green);font-weight:500;margin-bottom:1.1rem;}
.cook-timeline{position:relative;padding-right:22px;margin-bottom:1.5rem;}
.cook-timeline::before{content:'';position:absolute;right:8px;top:6px;bottom:6px;width:1px;background:var(--border2);}
.cook-block{position:relative;margin-bottom:11px;}
.cook-block::before{content:'';position:absolute;right:-17px;top:8px;width:9px;height:9px;border-radius:50%;background:var(--surface);border:1.5px solid var(--border2);}
.cook-block.active::before{background:var(--green);border-color:var(--green);}
.cook-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:9px 12px;}
.cook-card.clickable{cursor:pointer;}.cook-card.clickable:hover{border-color:var(--border2);}
.cook-time{font-size:10px;color:var(--green);font-weight:500;margin-bottom:2px;}
.cook-card h3{font-size:13px;font-weight:500;margin-bottom:3px;}
.cook-detail{font-size:11px;color:var(--text2);line-height:1.5;}
.missing-tag{font-size:10px;background:var(--red-light);color:var(--red);border-radius:4px;padding:1px 7px;display:inline-block;margin-top:4px;}
.section-divider{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin:1.25rem 0 .75rem;padding-top:.25rem;border-top:0.5px solid var(--border);}
.prep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:9px;}
.prep-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:.75rem;}
.prep-card h3{font-size:12px;font-weight:500;margin-bottom:7px;}
.prep-item{display:flex;align-items:flex-start;gap:7px;font-size:12px;padding:3px 0;line-height:1.45;}
.prep-item input{width:13px;height:13px;cursor:pointer;margin-top:2px;flex-shrink:0;accent-color:var(--green);}
.prep-item.done label{text-decoration:line-through;color:var(--text3);}
/* RECIPES */
.recipes-filter{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1rem;}
.filter-btn{padding:5px 12px;border:0.5px solid var(--border);border-radius:20px;background:none;cursor:pointer;font-size:12px;font-family:'Heebo',sans-serif;color:var(--text2);}
.filter-btn.active{background:var(--text);color:#fff;border-color:var(--text);}
.recipes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
.recipe-card,.side-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem;cursor:pointer;}
.recipe-card:hover,.side-card:hover{border-color:var(--border2);}
.recipe-title,.side-title{font-size:13px;font-weight:500;margin-bottom:3px;}
.recipe-meta{font-size:11px;color:var(--text3);}
.side-keep{font-size:10px;color:var(--text3);margin-bottom:6px;}
.side-desc{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:7px;}
.side-uses{display:flex;flex-wrap:wrap;gap:4px;}
.side-use-tag{font-size:10px;background:var(--surface2);border-radius:4px;padding:2px 7px;color:var(--text2);}
/* BADGES */
.cat-badge{font-size:10px;padding:2px 7px;border-radius:4px;display:inline-block;margin-bottom:5px;font-weight:500;}
.cat-תבשיל{background:var(--green-light);color:var(--green);}
.cat-קציצות{background:var(--amber-light);color:var(--amber);}
.cat-סלט{background:var(--blue-light);color:var(--blue);}
.cat-נשנוש{background:var(--purple-light);color:var(--purple);}
.cat-בצד{background:#FEF3E2;color:#7D5A20;}
.cat-מותסס{background:#E8F5E9;color:#2E7D32;}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;justify-content:center;z-index:200;}
.modal{background:var(--surface);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:1.25rem 1.25rem calc(1.25rem + env(safe-area-inset-bottom));width:100%;max-width:560px;max-height:88vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 1rem;}
.modal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem;}
.modal h2{font-size:16px;font-weight:500;}
.close-btn{background:none;border:none;cursor:pointer;font-size:20px;color:var(--text3);line-height:1;padding:0 0 0 4px;}
.ingr-table{width:100%;font-size:12px;margin-bottom:.75rem;}
.ingr-table td{padding:3px 0;vertical-align:top;}
.ingr-table td:first-child{color:var(--text2);width:140px;}
.step{font-size:12px;line-height:1.6;margin-bottom:6px;padding-right:22px;position:relative;}
.step-n{position:absolute;right:0;top:2px;font-size:10px;background:var(--surface2);border-radius:50%;width:15px;height:15px;display:flex;align-items:center;justify-content:center;font-weight:500;color:var(--text2);}
.tip-box{background:var(--green-light);border-radius:var(--radius);padding:8px 12px;font-size:11px;color:var(--green);margin-top:.75rem;line-height:1.55;}
.score-bar{height:3px;background:var(--surface2);border-radius:2px;margin-top:4px;}
.score-fill{height:3px;background:var(--green);border-radius:2px;}
.picker-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:.75rem;}
.picker-item{font-size:12px;padding:8px 10px;background:var(--surface2);border:0.5px solid var(--border);border-radius:var(--radius);cursor:pointer;line-height:1.4;}
.picker-item:hover{border-color:var(--border2);}
/* SMART TIMING */
.cook-phases{display:flex;flex-direction:column;gap:10px;margin-bottom:1.25rem;}
.phase-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:border-color .15s;}
.phase-card.phase-active{border-color:var(--green);box-shadow:0 0 0 3px var(--green-light);}
.phase-card.phase-done{opacity:.6;}
.phase-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;}
.phase-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;background:var(--surface2);}
.phase-card.phase-active .phase-icon{background:var(--green-light);}
.phase-card.phase-done .phase-icon{background:var(--green);color:white;}
.phase-title{font-size:13px;font-weight:500;flex:1;}
.phase-time-badge{font-size:11px;color:var(--green);font-weight:500;background:var(--green-light);padding:3px 8px;border-radius:20px;white-space:nowrap;}
.phase-time-badge.running{background:var(--green);color:white;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.7;}}
.phase-body{padding:0 14px 12px;display:none;}
.phase-card.phase-open .phase-body{display:block;}
.phase-steps{list-style:none;margin-bottom:8px;}
.phase-step{font-size:12px;color:var(--text2);padding:3px 0;display:flex;gap:8px;line-height:1.4;}
.phase-step::before{content:'→';color:var(--green);flex-shrink:0;}
.parallel-note{font-size:11px;background:#FEF3E2;color:#7D5A20;border-radius:6px;padding:5px 9px;margin-bottom:8px;}
.timer-row{display:flex;align-items:center;gap:8px;margin-top:8px;}
.timer-btn{padding:6px 14px;border:0.5px solid var(--green-mid);border-radius:var(--radius);background:var(--green-light);color:var(--green);font-size:12px;font-weight:500;cursor:pointer;font-family:'Heebo',sans-serif;}
.timer-btn:hover{background:var(--green-mid);}
.timer-display{font-size:13px;font-weight:500;color:var(--green);min-width:50px;}
.timer-done-badge{font-size:11px;background:var(--green);color:white;border-radius:20px;padding:2px 8px;}
.cook-summary{background:var(--green-light);border-radius:var(--radius);padding:10px 14px;margin-bottom:1rem;}
.cook-summary-title{font-size:13px;font-weight:500;color:var(--green);margin-bottom:4px;}
.cook-summary-detail{font-size:12px;color:var(--green);}
/* WEEK PLAN - 7 categories */
.week-plan-grid{display:flex;flex-direction:column;gap:8px;}
.week-cat-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:border-color .15s;}
.week-cat-card.selected{border-color:var(--green);border-width:1.5px;}
.week-cat-card.selected .week-cat-icon{background:var(--green-light);color:var(--green);}
.week-cat-header{display:flex;align-items:center;gap:10px;padding:12px 14px;}
.week-cat-icon{width:32px;height:32px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text2);}
.week-cat-info{flex:1;min-width:0;}
.week-cat-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;}
.week-cat-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.week-cat-name.empty{color:var(--text3);font-style:italic;font-weight:400;}
.week-cat-actions{display:flex;gap:6px;flex-shrink:0;}
.week-cat-btn{background:none;border:0.5px solid var(--border2);border-radius:8px;padding:5px 9px;font-size:11px;cursor:pointer;font-family:'Heebo',sans-serif;color:var(--text2);}
.week-cat-btn:hover{background:var(--surface2);}
.week-cat-btn.open-btn{background:var(--green-light);color:var(--green);border-color:var(--green-mid);}
.fresh-reminder{display:flex;align-items:center;gap:8px;background:var(--green-light);border-radius:var(--radius);padding:10px 14px;margin-top:1rem;font-size:12px;color:var(--green);}
@media(max-width:480px){.pantry-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<header class="header">
  <div class="logo">לאכול <span>פשוט</span></div>
</header>
<main class="content">
  <div id="pantry" class="section active">
    <div class="top-bar">
      <h2>המזווה שלי</h2>
      <div class="btn-row">
        <button class="btn btn-green" onclick="selectAllPantry()">בחר הכל</button>
        <button class="btn" onclick="clearPantry()">אפס</button>
      </div>
    </div>
    <p style="font-size:12px;color:var(--text2);margin-bottom:.875rem">סמני מה שיש בבית — התפריט ייבנה לפי זה. נשמר אוטומטית.</p>
    <div class="pantry-grid" id="pantryGrid"></div>
  </div>
  <div id="week" class="section">
    <div class="top-bar">
      <h2>מה מוכן השבוע</h2>
      <div class="btn-row">
        <button class="btn" onclick="resetWeekPlan()">איפוס</button>
        <button class="btn btn-green" onclick="buildWeekPlan()">הצע ↗</button>
      </div>
    </div>
    <p style="font-size:12px;color:var(--text2);margin-bottom:1rem">7 קטגוריות הכנה שמכסות שבוע שלם. לחצי על כרטיס לפתיחת המתכון, על ⇄ להחלפה.</p>
    <div id="weekPlanGrid"></div>
    <div class="fresh-reminder" id="freshReminder" style="display:none">
      <span>🌿</span>
      <span>לפני אכילה — הוסיפי ירוק טרי: פטרוזיליה, כוסברה, בצל ירוק, לימון</span>
    </div>
  </div>
  <div id="cookday" class="section">
    <div class="top-bar"><h2>יום הבישול</h2><button class="btn btn-green" id="startCookBtn" onclick="startCooking()" style="display:none">התחילי לבשל ▶</button></div>
    <div class="cook-total" id="cookTotal">בחרי מה להכין כדי לראות את תכנית הבישול</div>
    <div id="cookTimeline"></div>
  </div>
  <div id="recipes" class="section">
    <div class="top-bar"><h2>מתכונים</h2></div>
    <div class="recipes-filter" id="recipesFilter"></div>
    <div class="recipes-grid" id="recipesGrid"></div>
  </div>
</main>
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-pantry" onclick="showTab('pantry',this)">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    מזווה
  </button>
  <button class="nav-btn" id="nav-week" onclick="showTab('week',this)">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    תפריט
  </button>
  <button class="nav-btn" id="nav-cookday" onclick="showTab('cookday',this)">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    בישול
  </button>
  <button class="nav-btn" id="nav-recipes" onclick="showTab('recipes',this);renderRecipesTab()">
    <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
    מתכונים
  </button>
</nav>
<div id="modal" style="display:none" class="modal-bg" onclick="if(event.target.id==='modal')closeModal()">
  <div class="modal" id="modalInner"></div>
</div>
<script>
const DAYS=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
const RECIPES={
  'קציצות סלק, בטטה וירוקים':{cat:'קציצות',time:70,pantryKeys:['סלק','בטטה','קמח חומוס'],
    tip:'לסנן ירקות מגורדים לפחות 10 דקות. להוסיף קמח בהדרגה. הקציצות צריכות להיות רכות מבפנים.',
    ingredients:[['סלקים','3'],['בטטות','2'],['קמח חומוס','חצי כוס'],['צרור ירוקים קצוצים','—'],['כמון','כפית'],['שום יבש','כפית'],['שומשום מלא','—'],['טחינה גולמית','כף'],['מלח','כפית']],
    steps:['מבשלים סלקים 35 דקות. מגרדים לקערה.','מכניסים בטטות שלמות לתנור 45 דקות. לאחר קירור מוסיפים לסלק.','מוסיפים קמח חומוס, צרור ירוקים קצוץ, מלח, טחינה, כמון ואבקת שום.','מקצצים ומפזרים שומשום. מרססים שמן זית.','אופים 25 דקות על 180° טורבו.']},
  'קציצות טופו, קישואים וברוקולי':{cat:'קציצות',time:45,pantryKeys:['טופו','קישוא/זוקיני','קמח שקדים'],
    tip:'לאדות ברוקולי לפני — פחות נוזלים בקציצה. לסנן קישואים מגורדים לפחות 10 דקות.',
    ingredients:[['קישואים','6'],['טופו','300 גרם'],['קמח שקדים','חצי כוס'],['זרעי חמנייה','חופן'],['שמיר קצוץ','חצי צרור'],['שמרי בירה','כף'],['שום יבש','כפית'],['בצל יבש','כפית'],['מלח','כפית']],
    steps:['מאדים ברוקולי כ-5 דקות ומקררים מתחת למים. קוצצים.','מגרדים קישואים למסננת. מגירים נוזלים לכמה דקות תוך כדי לישה.','מוסיפים את הברוקולי לקערה עם הקישואים והטופו המגורד.','קוצצים שמיר ומוסיפים עם שאר הרכיבים.','אופים 25 דקות על 180°. לאחסן אחרי שהתקרר.']},

function saveWeekChoices(){ try{localStorage.setItem('week_choices',JSON.stringify(weekPlanChoices));}catch(e){} }

function getItemForCat(catId){
  const name = weekPlanChoices[catId];
  if(!name) return null;
  if(name==='steam') return SPECIAL_ITEMS.steam;
  if(name==='grains') return SPECIAL_ITEMS.grains;
  if(RECIPES[name]) return RECIPES[name];
  const side = SIDES.find(s=>s.name===name);
  return side||null;
}

function buildWeekPlan(){
  const all = Object.entries(RECIPES).map(([name,r])=>({name,...r,score:recipeScore(r)}));
  function ds(r){ const w=weeksSince(r.name); const b=w===Infinity?0.6:w===1?0:w===2?0.3:0.5; return r.score+b; }

  // Auto-pick best for each category
  weekPlanChoices = {};
  weekPlanChoices.steam = 'steam';
  weekPlanChoices.grains = 'grains';

  ['stew','patties','salad','snack'].forEach(catId=>{
    const cat = WEEK_CATS.find(c=>c.id===catId)?.cat;
    if(!cat) return;
    const best = all.filter(r=>r.cat===cat).sort((a,b)=>ds(b)-ds(a))[0];
    if(best) weekPlanChoices[catId] = best.name;
  });

  // Spread: pick available side
  const bestSpread = SIDES.filter(s=>s.cat!=='מותסס'&&(s.pantryKeys||[]).every(k=>pantryChecked[k]))[0]
    || SIDES.filter(s=>s.cat!=='מותסס').sort((a,b)=>((b.pantryKeys||[]).filter(k=>pantryChecked[k]).length/(b.pantryKeys||[1]).length) - ((a.pantryKeys||[]).filter(k=>pantryChecked[k]).length/(a.pantryKeys||[1]).length))[0];
  if(bestSpread) weekPlanChoices.spread = bestSpread.name;

  saveWeekChoices();
  // save to history
  const names = Object.values(weekPlanChoices).filter(n=>n&&n!=='steam'&&n!=='grains');
  saveHistory(names);

  renderWeekPlan();
  renderCookDay();
  document.getElementById('freshReminder').style.display='flex';
}

function resetWeekPlan(){
  weekPlanChoices={};
  saveWeekChoices();
  renderWeekPlan();
  renderCookDay();
  document.getElementById('freshReminder').style.display='none';
}

function renderWeekPlan(){
  const grid = document.getElementById('weekPlanGrid');
  if(!grid) return;

  const hasAny = Object.keys(weekPlanChoices).length > 0;
  if(hasAny) document.getElementById('freshReminder').style.display='flex';

  grid.innerHTML = '<div class="week-plan-grid">' +
    WEEK_CATS.map(cat=>{
      const chosen = weekPlanChoices[cat.id];
      const item = chosen ? getItemForCat(cat.id) : null;
      const missing = item && item.pantryKeys ? item.pantryKeys.filter(k=>!pantryChecked[k]) : [];

      return `<div class="week-cat-card${chosen?' selected':''}">
        <div class="week-cat-header">
          <div class="week-cat-icon">${CAT_ICONS[cat.icon]||cat.icon}</div>
          <div class="week-cat-info">
            <div class="week-cat-label">${cat.label}</div>
            <div class="week-cat-name${chosen?'':' empty'}">${item?item.name:'לא נבחר עדיין'}</div>
            ${missing.length ? `<div style="font-size:10px;color:var(--red);margin-top:2px">חסר: ${missing.join(', ')}</div>` : ''}
          </div>
          <div class="week-cat-actions">
            ${item ? `<button class="week-cat-btn open-btn" onclick="openCatItem('${cat.id}')">פתח</button>` : ''}
            <button class="week-cat-btn" onclick="openCatSwap('${cat.id}')">⇄</button>
          </div>
        </div>
      </div>`;
    }).join('') +
  '</div>';
}

function openCatItem(catId){
  const item = getItemForCat(catId);
  if(!item) return;
  // Check if it's a SIDES item
  const sideIdx = SIDES.findIndex(s=>s.name===item.name);
  if(sideIdx>=0){ openSideModal(sideIdx); return; }
  // Otherwise open recipe modal — find by name
  const rName = weekPlanChoices[catId];
  if(rName && rName!=='steam' && rName!=='grains' && RECIPES[rName]){ openRecipeModal(rName); return; }
  // Special item
  const mi = document.getElementById('modalInner');
  mi.innerHTML=`
    <div class="modal-handle"></div>

    <h3 style="font-size:11px;font-weight:600;color:var(--text2);margin:.5rem 0 4px;text-transform:uppercase">הוראות</h3>
    ${item.steps.map((s,i)=>`<div class="step"><span class="step-n">${i+1}</span>${s}</div>`).join('')}
    ${item.tip?`<div class="tip-box">💡 ${item.tip}</div>`:''}`;
  document.getElementById('modal').style.display='flex';
}

function openCatSwap(catId){
  const cat = WEEK_CATS.find(c=>c.id===catId);
  if(!cat) return;

  let options = [];

  if(catId==='steam' || catId==='grains'){
    // No swap for these
    return;
  }

  if(catId==='spread'){
    options = SIDES.filter(s=>s.cat!=='מותסס').map((s,i)=>({
      name: s.name,
      missing: (s.pantryKeys||[]).filter(k=>!pantryChecked[k]),
      score: (s.pantryKeys||[]).filter(k=>pantryChecked[k]).length / Math.max(1,(s.pantryKeys||[]).length),
      isSide: true, idx: i
    })).sort((a,b)=>b.score-a.score);
  } else {
    options = Object.entries(RECIPES)
      .filter(([n,r])=>r.cat===cat.cat)
      .map(([name,r])=>({name, missing:getMissing(r), score:recipeScore(r)}))
      .sort((a,b)=>b.score-a.score);
  }

  const mi = document.getElementById('modalInner');
  mi.innerHTML=`
    <div class="modal-handle"></div>
    <div class="modal-header"><h2>בחרי ${cat.label}</h2><button class="close-btn" onclick="closeModal()">×</button></div>
    <div class="picker-grid" style="grid-template-columns:1fr">
      ${options.map(opt=>`
        <div class="picker-item" style="display:flex;align-items:center;justify-content:space-between" onclick="setCatChoice('${catId}','${opt.name.replace(/'/g,"\\'")}')">
          <div>
            <div style="font-size:13px;font-weight:500">${opt.name}</div>
            ${opt.missing.length ? `<div style="font-size:10px;color:var(--red)">חסר: ${opt.missing.join(', ')}</div>` : `<div style="font-size:10px;color:var(--green)">✓ הכל זמין</div>`}
          </div>
          <div class="score-bar" style="width:60px;flex-shrink:0"><div class="score-fill" style="width:${Math.round(opt.score*100)}%"></div></div>
        </div>`).join('')}
    </div>`;
  document.getElementById('modal').style.display='flex';
}

function setCatChoice(catId, name){
  weekPlanChoices[catId] = name;
  saveWeekChoices();
  closeModal();
  renderWeekPlan();
  renderCookDay();
}

    id:'grains', icon:'grains', title:'2 סוגי דגנים', mins:20,
    parallel:false, isPrep:false,
    steps:['קינואה: 12 דקות במים רבים כמו פסטה. לסנן שעה.','פריקי/כוסמת: עם 2 כוסות מים, אש נמוכה 15 דקות.'],
    note:null, missing:null, recipeName:null
  });

  // Main recipes from weekPlanChoices — sorted by time (longest first)
  const recipePhases = [];
  Object.entries(weekPlanChoices).forEach(([catId, name])=>{
    if(catId==='steam'||catId==='grains') return;
    const r = RECIPES[name];
    if(r){
      const m = getMissing(r);
      recipePhases.push({
        id:'recipe_'+catId, icon:'stew', title:name, mins:r.time||30,
        parallel:r.time>=40, isPrep:false, recipeName:name,
        steps:r.steps||[], missing:m.length?m:null,
        note:r.time>=40?'אפשר להתחיל במקביל לירקות המאודים':null
      });
    } else {
      // SIDES item (ממרח)
      const side = SIDES.find(s=>s.name===name);
      if(side){
        recipePhases.push({
          id:'recipe_'+catId, icon:'spread', title:name, mins:side.time||15,
          parallel:false, isPrep:false, recipeName:null, isSide:true, sideName:name,
          steps:side.steps||[], missing:null, note:null
        });
      }
    }
  });

  // Sort: longest first
  recipePhases.sort((a,b)=>b.mins-a.mins);
  phases.push(...recipePhases);

  // Storage
  phases.push({
    id:'store', icon:'store', title:'אחסון', mins:10,
    parallel:false, isPrep:false,
    steps:['כלי זכוכית אטומים לכל דבר','תיוג תאריך על כל קופסה','ירקות מאודים — קופסה נפרדת לכל סוג'],
    note:null, missing:null, recipeName:null
  });

  return phases;
}

function renderCookDay(){
  const timeline = document.getElementById('cookTimeline');
  const startBtn = document.getElementById('startCookBtn');
  if(!Object.keys(weekPlanChoices).length){
    document.getElementById('cookTotal').textContent='בחרי מה להכין כדי לראות את תכנית הבישול';
    if(timeline) timeline.innerHTML='';
    if(startBtn) startBtn.style.display='none';
    return;
  }

  const phases=buildSmartSchedule();
  
  // Calculate real time (parallel phases save time)
  const parallelSavings=phases.filter(p=>p.parallel&&!p.isPrep).reduce((s,p)=>s+p.mins*0.7,0);
  const totalSeq=phases.filter(p=>!p.isPrep).reduce((s,p)=>s+p.mins,0);
  const realMins=Math.round(totalSeq-parallelSavings);

  document.getElementById('cookTotal').textContent='';
  if(document.getElementById('startCookBtn')) document.getElementById('startCookBtn').style.display='block';
  
  document.getElementById('cookTimeline').innerHTML=`
    <div class="cook-summary">
      <div class="cook-summary-title">סה"כ זמן בישול משוער: כ-${realMins} דקות (כ-${Math.ceil(realMins/60)} שעות)</div>
      <div class="cook-summary-detail">💡 ${phases.filter(p=>p.parallel&&!p.isPrep).length} שלבים רצים במקביל — חוסכים זמן משמעותי</div>
    </div>
    <div class="cook-phases" id="cookPhases">
      ${phases.map((p,i)=>renderPhaseCard(p,i)).join('')}
    </div>`;
}

function renderPhaseCard(p,i){
  const timerState=cookTimers[p.id]||{};
  const isDone=timerState.done;
  const isRunning=timerState.running;
  const isOpen=cookPhaseOpen===i;
  const elapsed=timerState.elapsed||0;
  const remaining=Math.max(0, p.mins*60 - elapsed);
  const mm=String(Math.floor(remaining/60)).padStart(2,'0');
  const ss=String(remaining%60).padStart(2,'0');

  return `<div class="phase-card${isDone?' phase-done':''}${isRunning?' phase-active':''}${isOpen?' phase-open':''}" id="phase_${i}">
    <div class="phase-header" onclick="togglePhase(${i})">
      <div class="phase-icon">${isDone?'<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>':(CAT_ICONS[p.icon]||p.icon)}</div>
      <div class="phase-title">${p.title}${p.missing?` <span style="font-size:10px;background:var(--red-light);color:var(--red);border-radius:4px;padding:1px 5px">חסר</span>`:''}</div>
      ${isRunning
        ? `<div class="phase-time-badge running">${mm}:${ss}</div>`
        : isDone
          ? `<div class="timer-done-badge">✓ הסתיים</div>`
          : `<div class="phase-time-badge">${p.mins} דקות</div>`
      }
    </div>
    <div class="phase-body">
      ${p.note?`<div class="parallel-note">⚡ ${p.note}</div>`:''}
      ${p.missing?`<div class="missing-tag" style="margin-bottom:8px">חסר: ${p.missing.join(', ')}</div>`:''}
      <ul class="phase-steps">${p.steps.map(s=>`<li class="phase-step">${s}</li>`).join('')}</ul>
      <div class="timer-row">
        ${p.recipeName?`<button class="timer-btn" style="background:var(--surface2);color:var(--text);border-color:var(--border2)" onclick="event.stopPropagation();openRecipeModal('${p.recipeName.replace(/'/g,"\\'")}')">פתח מתכון</button>`:p.isSide&&p.sideName?`<button class="timer-btn" style="background:var(--surface2);color:var(--text);border-color:var(--border2)" onclick="event.stopPropagation();openSideByName('${(p.sideName||'').replace(/'/g,"\\'")}')">פתח מתכון</button>`:''}
        ${!isDone && !p.isPrep ? `<button class="timer-btn" onclick="event.stopPropagation();startTimer(${i},'${p.id}',${p.mins})">${isRunning?'עצור':'הפעל טיימר'} ${p.mins} דקות</button>` : ''}
        ${!isDone?`<button class="timer-btn" style="background:var(--green);color:white;border-color:var(--green)" onclick="event.stopPropagation();markDone(${i},'${p.id}')">סיימתי ✓</button>`:''}
        ${isRunning?`<div class="timer-display">${mm}:${ss}</div>`:''}
      </div>
    </div>
  </div>`;
}

function togglePhase(i){
  cookPhaseOpen = cookPhaseOpen===i ? -1 : i;
  refreshCookDay();
}

function markDone(i,id){
  if(cookTimers[id]?.interval) clearInterval(cookTimers[id].interval);
  cookTimers[id]={done:true};
  cookPhaseOpen=i+1; // auto-open next
  refreshCookDay();
}

function startTimer(i,id,mins){
  if(cookTimers[id]?.running){
    clearInterval(cookTimers[id].interval);
    cookTimers[id].running=false;
    cookTimers[id].elapsed=cookTimers[id].elapsed||0;
  } else {
    const startTime=Date.now()-(cookTimers[id]?.elapsed||0)*1000;
    const interval=setInterval(()=>{
      const elapsed=Math.floor((Date.now()-startTime)/1000);
      cookTimers[id]={...cookTimers[id],running:true,elapsed,interval};
      if(elapsed>=mins*60){
        clearInterval(interval);
        cookTimers[id]={done:true};
        // Vibrate if supported
        if(navigator.vibrate) navigator.vibrate([200,100,200]);
        refreshCookDay();
      } else {
        refreshTimerDisplay(i,id,mins,elapsed);
      }
    },1000);
    cookTimers[id]={running:true,elapsed:cookTimers[id]?.elapsed||0,interval};
  }
  refreshCookDay();
}

function refreshTimerDisplay(i,id,mins,elapsed){
  const remaining=Math.max(0,mins*60-elapsed);
  const mm=String(Math.floor(remaining/60)).padStart(2,'0');
  const ss=String(remaining%60).padStart(2,'0');
  const badge=document.querySelector(`#phase_${i} .phase-time-badge`);
  const disp=document.querySelector(`#phase_${i} .timer-display`);
  if(badge) badge.textContent=mm+':'+ss;
  if(disp) disp.textContent=mm+':'+ss;
}

function refreshCookDay(){
  const phases=buildSmartSchedule();
  const el=document.getElementById('cookPhases');
  if(el) el.innerHTML=phases.map((p,i)=>renderPhaseCard(p,i)).join('');
}

function startCooking(){
  cookPhaseOpen=1; // open first real phase
  cookingStarted=true;
  refreshCookDay();
  document.getElementById('startCookBtn').textContent='מתבשל... 🍳';
  document.getElementById('startCookBtn').disabled=true;
}

function renderPrepList(){
  const bc={'תבשיל':'background:#D8EDDF;color:#2D6A4F','קציצות':'background:#FAEADA;color:#7D4E24','סלט':'background:#D4E9F7;color:#1B4F72','נשנוש':'background:#EAE4F5;color:#4A3A6B','בצד':'background:#FEF3E2;color:#7D5A20'};
  const sections=[];
  sections.push({title:'יום לפני',badge:'',tasks:['השרייה: קטניות לתבשיל','השרייה: אגוזים לגבינה (אם מכינים)','הנבטות: מש/עדשים/כוסמת ירוקה']});
  sections.push({title:'ירקות ודגנים',badge:'',tasks:['סיר אידוי שורשים — 40 דקות','בישול 2 סוגי דגנים, כוס מכל','ירקות מהירים 5–25 דקות','ירקות בתנור לפי בחירה']});
  currentChosen.forEach(r=>sections.push({title:r.name,badge:r.cat,tasks:['לאסוף מרכיבים',...r.steps]}));
  if(weekSnack)sections.push({title:'נשנוש: '+weekSnack,badge:'נשנוש',tasks:[...(RECIPES[weekSnack]?.steps||[])]});
  const avail=SIDES.filter(s=>s.cat!=='מותסס'&&(s.pantryKeys||[]).every(k=>pantryChecked[k]));
  if(avail.length)sections.push({title:'הכנות בצד',badge:'בצד',isSide:true,tasks:avail.map(s=>`${s.name} — ${s.keep}`)});
  sections.push({title:'אחסון',badge:'',tasks:['כלי זכוכית אטומים','תיוג תאריך על כל קופסה','ירקות מאודים — נפרד לפי סוג']});
  document.getElementById('prepGrid').innerHTML=sections.map((s,si)=>`
    <div class="prep-card">
      <h3>${s.badge?`<span style="font-size:10px;padding:1px 6px;border-radius:3px;${bc[s.badge]||''}">${s.badge}</span> `:''}${s.title}</h3>
      ${s.tasks.map((t,ti)=>{const k=`${si}_${ti}`;
        if(s.isSide){const sn=t.split(' — ')[0];return `<div class="prep-item" id="pi_${k}"><input type="checkbox" onchange="togglePrep('${k}',this)"><span onclick="openSideByName('${sn}')" style="cursor:pointer">${t}</span></div>`;}
        return `<label class="prep-item" id="pi_${k}"><input type="checkbox" onchange="togglePrep('${k}',this)"> ${t}</label>`;}).join('')}
    </div>`).join('');
}
function togglePrep(k,el){document.getElementById('pi_'+k).classList.toggle('done',el.checked);}
function renderRecipesTab(){
  const cats=['הכל','תבשיל','קציצות','סלט','נשנוש','בצד','מותסס'];
  document.getElementById('recipesFilter').innerHTML=cats.map(c=>`<button class="filter-btn${c===activeRecipeFilter?' active':''}" onclick="setRecipeFilter('${c}')">${c}</button>`).join('');
  const grid=document.getElementById('recipesGrid');
  if(activeRecipeFilter==='בצד'||activeRecipeFilter==='מותסס'){
    const filtered=activeRecipeFilter==='מותסס'
      ? SIDES.filter(s=>s.cat==='מותסס')
      : SIDES.filter(s=>s.cat!=='מותסס');
    grid.innerHTML=filtered.map((s,i)=>{
      const realIdx=SIDES.indexOf(s);
      const m=(s.pantryKeys||[]).filter(k=>!pantryChecked[k]);
      const badge=s.cat==='מותסס'?'מותסס':'בצד';
      return `<div class="side-card" onclick="openSideModal(${realIdx})">
        <span class="cat-badge cat-${badge}">${badge}</span>
        <div class="side-title">${s.name}</div>
        <div class="side-keep">${s.keep}</div>
        <div class="side-desc">${s.desc}</div>
        <div class="side-uses">${s.uses.map(u=>`<span class="side-use-tag">${u}</span>`).join('')}</div>
        ${m.length?`<div class="missing-tag" style="margin-top:6px">חסר: ${m.join(', ')}</div>`:`<div style="font-size:10px;color:var(--green);margin-top:6px">✓ הכל זמין</div>`}
      </div>`;
    }).join('');
  } else {
    const entries=Object.entries(RECIPES).filter(([n,r])=>activeRecipeFilter==='הכל'||r.cat===activeRecipeFilter);
    grid.innerHTML=entries.map(([name,r])=>{
      const m=getMissing(r);
      return `<div class="recipe-card" onclick="openRecipeModal('${name}')">
        <span class="cat-badge cat-${r.cat}">${r.cat}</span>
        <div class="recipe-title">${name}</div>
        <div class="recipe-meta">${r.time} דקות · ${r.ingredients.length} מרכיבים</div>
        ${m.length?`<div class="missing-tag" style="margin-top:5px">חסר: ${m.join(', ')}</div>`:`<div style="font-size:10px;color:var(--green);margin-top:5px">✓ הכל זמין</div>`}
      </div>`;
    }).join('');
  }
}
function setRecipeFilter(cat){activeRecipeFilter=cat;renderRecipesTab();}
function openRecipeModal(name){
  const r=RECIPES[name];if(!r)return;
  const m=getMissing(r);
  document.getElementById('modalInner').innerHTML=`
    <div class="modal-handle"></div>
    <div class="modal-header"><div><span class="cat-badge cat-${r.cat}">${r.cat}</span><h2>${name}</h2></div><button class="close-btn" onclick="closeModal()">×</button></div>
    ${m.length?`<div class="missing-tag" style="margin-bottom:8px">חסר: ${m.join(', ')}</div>`:''}
    <p style="font-size:11px;color:var(--text3);margin-bottom:.5rem">זמן הכנה: ~${r.time} דקות${r.source?` · מקור: <a href="https://${r.source}" target="_blank" style="color:var(--green)">${r.source}</a>`:''}</p>
    <h3 style="font-size:11px;font-weight:600;color:var(--text2);margin:.5rem 0 4px;text-transform:uppercase;letter-spacing:.5px">מרכיבים</h3>
    <table class="ingr-table">${r.ingredients.map(([n,q])=>`<tr><td>${n}</td><td>${q||''}</td></tr>`).join('')}</table>
    <h3 style="font-size:11px;font-weight:600;color:var(--text2);margin:.5rem 0 4px;text-transform:uppercase;letter-spacing:.5px">הוראות</h3>
    ${r.steps.map((s,i)=>`<div class="step"><span class="step-n">${i+1}</span>${s}</div>`).join('')}
    ${r.tip?`<div class="tip-box">💡 ${r.tip}</div>`:''}`;
  document.getElementById('modal').style.display='flex';
}
function openSideModal(i){
  const s=SIDES[i];
  const m=(s.pantryKeys||[]).filter(k=>!pantryChecked[k]);
  document.getElementById('modalInner').innerHTML=`
    <div class="modal-handle"></div>
    <div class="modal-header"><div><span class="cat-badge cat-בצד">בצד</span><h2>${s.name}</h2></div><button class="close-btn" onclick="closeModal()">×</button></div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:6px">${s.keep}</div>
    ${m.length?`<div class="missing-tag" style="margin-bottom:8px">חסר: ${m.join(', ')}</div>`:''}
    <div class="side-uses" style="margin-bottom:.75rem">${s.uses.map(u=>`<span class="side-use-tag">${u}</span>`).join('')}</div>
    <h3 style="font-size:11px;font-weight:600;color:var(--text2);margin:.5rem 0 4px;text-transform:uppercase;letter-spacing:.5px">מרכיבים</h3>
    <table class="ingr-table">${s.ingredients.map(([n,q])=>`<tr><td>${n}</td><td>${q||''}</td></tr>`).join('')}</table>
    <h3 style="font-size:11px;font-weight:600;color:var(--text2);margin:.5rem 0 4px;text-transform:uppercase;letter-spacing:.5px">הכנה</h3>
    ${s.steps.map((st,i)=>`<div class="step"><span class="step-n">${i+1}</span>${st}</div>`).join('')}
    ${s.tip?`<div class="tip-box">💡 ${s.tip}</div>`:''}`;
  document.getElementById('modal').style.display='flex';
}
function openSnackSwap(){
  const snacks=Object.entries(RECIPES).filter(([n,r])=>r.cat==='נשנוש'&&n!==weekSnack).sort((a,b)=>recipeScore(b[1])-recipeScore(a[1]));
  document.getElementById('modalInner').innerHTML=`
    <div class="modal-handle"></div>
    <div class="modal-header"><h2>החלפת נשנוש</h2><button class="close-btn" onclick="closeModal()">×</button></div>
    <div class="picker-grid">${snacks.map(([name,r])=>{
      const sc=Math.round(recipeScore(r)*100);const m=getMissing(r);
      return `<div class="picker-item" onclick="swapSnack('${name}')">
        <span class="cat-badge cat-נשנוש">נשנוש</span><br>${name}
        <div class="score-bar"><div class="score-fill" style="width:${sc}%"></div></div>
        <span style="font-size:10px;color:${m.length?'#8B2E2E':'#2D6A4F'}">${m.length?'חסר: '+m.join(', '):'הכל זמין'}</span>
      </div>`;
    }).join('')}</div>`;
  document.getElementById('modal').style.display='flex';
}

function swapSnack(name){weekSnack=name;closeModal();renderWeek();renderCookDay();renderPrepList();}
function openPicker(day,meal){
  const all=Object.entries(RECIPES).filter(([n,r])=>r.cat!=='נשנוש').sort((a,b)=>recipeScore(b[1])-recipeScore(a[1]));
  document.getElementById('modalInner').innerHTML=`
    <div class="modal-handle"></div>
    <div class="modal-header"><h2>ארוחת ${meal} — ${day}</h2><button class="close-btn" onclick="closeModal()">×</button></div>
    <div class="picker-grid">${all.map(([name,r])=>{
      const sc=Math.round(recipeScore(r)*100);const m=getMissing(r);
      return `<div class="picker-item" onclick="assignMeal('${day}','${meal}','${name}')">
        <span class="cat-badge cat-${r.cat}">${r.cat}</span><br>${name}
        <div class="score-bar"><div class="score-fill" style="width:${sc}%"></div></div>
        <span style="font-size:10px;color:${m.length?'#8B2E2E':'#2D6A4F'}">${m.length?'חסר: '+m.join(', '):'הכל זמין'}</span>
      </div>`;
    }).join('')}</div>`;
  document.getElementById('modal').style.display='flex';
}
function assignMeal(day,meal,name){
  if(!weekPlan[day])weekPlan[day]={};
  weekPlan[day][meal]=name;
  closeModal();
  const used=[...new Set(Object.values(weekPlan).flatMap(d=>Object.values(d)))];
  currentChosen=used.map(n=>({name:n,...RECIPES[n],score:recipeScore(RECIPES[n])})).filter(r=>r.cat&&r.cat!=='נשנוש');
  saveWeek();renderWeek();renderCookDay();renderPrepList();
}
function closeModal(){document.getElementById('modal').style.display='none';}
function renderPantry(){
  document.getElementById('pantryGrid').innerHTML=Object.entries(PANTRY_ITEMS).map(([cat,items])=>`
    <div class="pcat"><h3>${cat}</h3>${items.map(item=>{
      const id='p_'+item.replace(/[^\w\u05D0-\u05EA]/g,'_');
      return `<div class="p-item-row${pantryChecked[item]?' checked':''}" id="pw_${id}">
        <input type="checkbox" id="${id}" ${pantryChecked[item]?'checked':''} onchange="togglePantry('${item}','${id}',this)">
        <label for="${id}">${item}</label>
      </div>`;
    }).join('')}</div>`).join('');
}
function togglePantry(item,id,el){
  pantryChecked[item]=el.checked;
  document.getElementById('pw_'+id).classList.toggle('checked',el.checked);
  savePantry();
}
function selectAllPantry(){
  Object.entries(PANTRY_ITEMS).forEach(([cat,items])=>{
    items.forEach(item=>{ pantryChecked[item]=true; });
  });
  savePantry(); renderPantry();
}
function clearPantry(){
  if(!confirm('לאפס את כל המזווה?'))return;
  pantryChecked={};savePantry();renderPantry();
}
renderPantry();
renderWeekPlan();
renderRecipesTab();
renderCookDay();
if(Object.keys(weekPlanChoices).length) document.getElementById('freshReminder').style.display='flex';
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>
